<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BOOK TREND RESEARCH</title>
    <meta name="description" content="キーワードを含む書籍の出版数推移を調べます。" />
    <link rel="stylesheet" href="./static/style.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <h1>BOOK TREND RESEARCH</h1>
        <p class="lead">
          キーワードを含む書籍の出版数推移を調べます。
        </p>
      </section>

      <section class="panel search-panel">
        <form id="search-form" class="search-form">
          <label class="field">
            <input
              id="keyword-input"
              name="keyword"
              type="text"
              maxlength="120"
              placeholder="調べたいキーワードを入力"
              required
            />
          </label>
          <button id="search-button" class="search-icon-button" type="submit" aria-label="集計する">
            <img src="./static/search_icon.png" alt="" />
          </button>
        </form>
        <div id="status" class="status" aria-live="polite"></div>
      </section>

      <section id="result-panel" class="panel result-panel hidden">
        <div class="result-head">
          <div>
            <p id="result-keyword" class="result-keyword"></p>
            <p id="result-meta" class="result-meta"></p>
          </div>
        </div>

        <div class="result-filter-bar">
          <div class="result-filter-label">期間フィルタ</div>
          <div class="filters-grid">
            <label class="field">
              <span>始点</span>
              <input id="start-year-input" name="startYear" type="number" min="1000" step="1" value="1950" />
            </label>
            <label class="field">
              <span>終点</span>
              <input id="end-year-input" name="endYear" type="number" min="1000" step="1" />
            </label>
          </div>
          <button id="apply-filters-button" class="toggle-button" type="button">期間を更新</button>
        </div>

        <div class="chart-card">
          <div class="chart-topline">
            <strong>出版件数の推移</strong>
            <span id="chart-range"></span>
          </div>
          <svg id="chart" class="chart" viewBox="0 0 920 380" role="img" aria-label="出版件数の推移グラフ"></svg>
        </div>

        <div class="table-card">
          <div class="table-topline">
            <strong>年ごとの件数</strong>
            <span id="table-summary"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>出版年</th>
                  <th>件数</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="books-panel" class="panel books-panel hidden">
        <div class="books-head">
          <div>
            <p class="result-keyword">年別の書籍一覧</p>
            <p id="books-meta" class="result-meta">年を選ぶと、その年を明示条件として検索できた書誌一覧を表示します。推定年として集計された資料は含まれない場合があります。</p>
          </div>
        </div>

        <div class="year-picker">
          <label class="field year-field">
            <span>対象年</span>
            <select id="year-select"></select>
          </label>
          <button id="load-books-button" type="button">一覧を表示</button>
        </div>

        <div id="books-status" class="status" aria-live="polite">
          年次集計のあとに利用できます。下部一覧は出版年を明示条件で絞った検索結果です。
        </div>

        <div class="books-card">
          <ol id="books-list" class="books-list"></ol>
        </div>

        <div class="books-pager">
          <button id="prev-page-button" type="button">前へ</button>
          <span id="books-page-label" class="result-meta"></span>
          <button id="next-page-button" type="button">次へ</button>
        </div>
      </section>

      <footer class="data-source">
        データソースとして国立国会図書館サーチ（NDL Search）SRU API を使用しています。
      </footer>
    </main>

    <script src="./static/app.js"></script>
  </body>
</html>
