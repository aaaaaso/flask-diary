<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>三寒四温</title>
  <meta name="description" content="向こう1週間の東京の最高気温を、寒・温・涼で数える。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700&family=Zen+Kaku+Gothic+New:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #efefe7;
      --ink: #2d2b1f;
      --muted: rgba(45, 43, 31, 0.62);
      --line: rgba(45, 43, 31, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Zen Kaku Gothic New", system-ui, sans-serif;
      background:
        linear-gradient(180deg, #f6f4ef 0%, #f1efe5 38%, #ececde 100%);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      position: relative;
      z-index: 1;
      width: min(720px, 100%);
      min-height: min(82dvh, 760px);
      padding: clamp(24px, 5vw, 48px);
      display: grid;
      grid-template-rows: auto auto auto;
      align-content: center;
      gap: 22px;
      text-align: center;
    }

    .lead,
    .credit {
      font-size: clamp(12px, 1.6vw, 14px);
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .lead {
      justify-self: center;
      align-self: start;
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 0.35em;
      flex-wrap: wrap;
      justify-content: center;
    }

    .lead.is-hidden {
      visibility: hidden;
    }

    .city-select {
      appearance: none;
      border: none;
      border-bottom: 1px solid rgba(45, 43, 31, 0.2);
      background: transparent;
      color: inherit;
      font: inherit;
      letter-spacing: inherit;
      text-align: center;
      width: auto;
      min-width: 0;
      padding: 0 3px 1px;
      border-radius: 0;
      cursor: pointer;
    }

    .city-select:focus {
      outline: none;
      border-bottom-color: rgba(45, 43, 31, 0.5);
    }

    .result-wrap {
      display: grid;
      place-items: center;
      gap: 28px;
    }

    .result {
      margin: 0;
      font-family: "Zen Old Mincho", serif;
      font-weight: 700;
      font-size: clamp(42px, 9vw, 88px);
      letter-spacing: 0.06em;
      line-height: 1.15;
    }

    .credit {
      justify-self: center;
      align-self: end;
      margin-bottom: 4px;
      font-size: clamp(9px, 1.1vw, 10px);
      letter-spacing: 0.1em;
    }

    .credit a {
      color: inherit;
      text-decoration: none;
    }

    .chart {
      width: min(640px, 100%);
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .chart.is-ready {
      opacity: 1;
    }

    .chart svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .chart-label,
    .chart-day,
    .chart-temp {
      fill: var(--muted);
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    .chart-label {
      font-size: 12px;
    }

    .chart-grid {
      stroke: var(--line);
      stroke-width: 1;
    }

    .chart-area {
      fill: rgba(148, 191, 84, 0.16);
      opacity: 0;
      animation: chartAreaFade 0.9s ease 0.35s forwards;
    }

    .chart-line-max {
      fill: none;
      stroke: #86b347;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-line-min {
      fill: none;
      stroke: #a4a79d;
      stroke-width: 2.4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chart-line-max.is-animating {
      animation: drawLine 1.25s ease forwards;
    }

    .chart-line-min.is-animating {
      animation: drawLine 1.25s ease 0.1s forwards;
    }

    .chart-day {
      opacity: 0;
      animation: fadeUpIn 0.5s ease forwards;
    }

    .result.is-loading {
      font-family: "Zen Kaku Gothic New", system-ui, sans-serif;
      font-weight: 400;
      font-size: clamp(12px, 1.6vw, 14px);
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .result.is-message {
      font-family: "Zen Kaku Gothic New", system-ui, sans-serif;
      font-weight: 500;
      font-size: clamp(21px, 4.5vw, 44px);
      letter-spacing: 0.04em;
      line-height: 1.4;
    }

    .result-cool {
      display: block;
      font-size: 0.43em;
      letter-spacing: 0.04em;
      margin-top: 0.22em;
      text-align: center;
      color: rgba(45, 43, 31, 0.44);
    }

    .result-cool-join {
      font-size: 0.7em;
    }

    @keyframes drawLine {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes chartAreaFade {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    @keyframes fadeUpIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      body {
        padding: 18px;
        min-height: 100dvh;
      }

      main {
        width: 100%;
        min-height: calc(100dvh - 36px);
        padding: 20px 0;
        gap: 16px;
      }

      .result-wrap {
        gap: 12px;
      }

      .chart {
        width: 90vw;
        max-width: 90vw;
      }

      .chart-day,
      .chart-temp {
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="lead" id="lead">
      <span>向こう1週間の</span>
      <select class="city-select" id="citySelect" aria-label="主要都市を選択">
        <option value="tokyo" selected>東京</option>
        <option value="sapporo">札幌</option>
        <option value="sendai">仙台</option>
        <option value="nagoya">名古屋</option>
        <option value="osaka">大阪</option>
        <option value="hiroshima">広島</option>
        <option value="fukuoka">福岡</option>
        <option value="naha">那覇</option>
      </select>
      <span>は</span>
    </div>
    <section class="result-wrap" aria-live="polite">
      <div>
        <p class="result is-loading" id="result">loading...</p>
      </div>
      <div class="chart" id="chart" aria-label="向こう1週間の東京の最低気温と最高気温の推移"></div>
    </section>
    <div class="credit">
      <a href="https://open-meteo.com/" target="_blank" rel="noopener noreferrer">Weather data by Open-Meteo.com</a>
    </div>
  </main>

  <script>
    const CITIES = {
      tokyo: { label: "東京", latitude: 35.6762, longitude: 139.6503 },
      sapporo: { label: "札幌", latitude: 43.0618, longitude: 141.3545 },
      sendai: { label: "仙台", latitude: 38.2682, longitude: 140.8694 },
      nagoya: { label: "名古屋", latitude: 35.1815, longitude: 136.9066 },
      osaka: { label: "大阪", latitude: 34.6937, longitude: 135.5023 },
      hiroshima: { label: "広島", latitude: 34.3853, longitude: 132.4553 },
      fukuoka: { label: "福岡", latitude: 33.5902, longitude: 130.4017 },
      naha: { label: "那覇", latitude: 26.2124, longitude: 127.6809 }
    };

    const resultEl = document.getElementById("result");
    const chartEl = document.getElementById("chart");
    const leadEl = document.getElementById("lead");
    const citySelectEl = document.getElementById("citySelect");
    const previewMonth = null;

    const kansuji = ["零", "一", "二", "三", "四", "五", "六", "七"];

    const toKansuji = (num) => kansuji[num] ?? String(num);

    const classify = (temp) => {
      if (temp < 12) return "cold";
      if (temp >= 15) return "warm";
      return "cool";
    };

    const getSeasonMessage = () => {
      const month = previewMonth ?? (new Date().getMonth() + 1);
      if (month === 5) {
        return "もうあったかいね";
      }
      if (month >= 6 || month === 1) {
        return "春はまだ先かも";
      }
      return null;
    };

    const buildLabel = ({ cold, warm, cool }) => {
      const seasonalMessage = getSeasonMessage();
      if (seasonalMessage) {
        return { html: seasonalMessage, isMessage: true };
      }
      const main = `${toKansuji(cold)}寒${toKansuji(warm)}温`;
      if (cool > 0) {
        return {
          html: `${main}<span class="result-cool"><span class="result-cool-join">と</span>${toKansuji(cool)}涼</span>`,
          isMessage: false
        };
      }
      return { html: main, isMessage: false };
    };

    const buildPath = (points) => points.map((point, index) => {
      const prefix = index === 0 ? "M" : "L";
      return `${prefix}${point.x.toFixed(1)},${point.y.toFixed(1)}`;
    }).join(" ");

    const buildAreaPath = (upperPoints, lowerPoints) => {
      const topPath = buildPath(upperPoints);
      const bottomPath = lowerPoints
        .slice()
        .reverse()
        .map((point) => `L${point.x.toFixed(1)},${point.y.toFixed(1)}`)
        .join(" ");
      return `${topPath} ${bottomPath} Z`;
    };

    const formatDay = (date) => {
      const [, month, day] = date.split("-");
      return `${Number(month)}/${Number(day)}`;
    };

    const renderChart = (days, minTemps, maxTemps) => {
      const width = 640;
      const height = 240;
      const left = 34;
      const right = 18;
      const top = 16;
      const bottom = 34;
      const innerWidth = width - left - right;
      const innerHeight = height - top - bottom;

      const temps = [...minTemps, ...maxTemps];
      const minValue = Math.floor(Math.min(...temps) - 1);
      const maxValue = Math.ceil(Math.max(...temps) + 1);
      const range = Math.max(1, maxValue - minValue);

      const xAt = (index) => left + (innerWidth * index) / Math.max(1, days.length - 1);
      const yAt = (value) => top + ((maxValue - value) / range) * innerHeight;

      const maxPoints = maxTemps.map((temp, index) => ({ x: xAt(index), y: yAt(temp), temp }));
      const minPoints = minTemps.map((temp, index) => ({ x: xAt(index), y: yAt(temp), temp }));
      const maxPath = buildPath(maxPoints);
      const minPath = buildPath(minPoints);

      const guideTemps = Array.from({ length: 4 }, (_, index) => {
        const ratio = index / 3;
        return Math.round((maxValue - range * ratio) * 10) / 10;
      });

      chartEl.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img">
          ${guideTemps.map((temp) => `
            <g>
              <line class="chart-grid" x1="${left}" y1="${yAt(temp)}" x2="${width - right}" y2="${yAt(temp)}"></line>
              <text class="chart-temp" x="0" y="${yAt(temp) + 4}">${temp.toFixed(0)}℃</text>
            </g>
          `).join("")}
          <path class="chart-area" d="${buildAreaPath(maxPoints, minPoints)}"></path>
          <path class="chart-line-max" d="${maxPath}"></path>
          <path class="chart-line-min" d="${minPath}"></path>
          ${days.map((day, index) => `<text class="chart-day" x="${xAt(index)}" y="${height - 8}" text-anchor="middle" style="animation-delay:${0.5 + index * 0.05}s">${day}</text>`).join("")}
        </svg>
      `;
      const maxPathEl = chartEl.querySelector(".chart-line-max");
      const minPathEl = chartEl.querySelector(".chart-line-min");
      if (maxPathEl) {
        const length = maxPathEl.getTotalLength();
        maxPathEl.style.strokeDasharray = String(length);
        maxPathEl.style.strokeDashoffset = String(length);
      }
      if (minPathEl) {
        const length = minPathEl.getTotalLength();
        minPathEl.style.strokeDasharray = String(length);
        minPathEl.style.strokeDashoffset = String(length);
      }
      chartEl.getBoundingClientRect();
      maxPathEl?.classList.add("is-animating");
      minPathEl?.classList.add("is-animating");
      chartEl.classList.add("is-ready");
    };

    const loadWeather = async () => {
      const city = CITIES[citySelectEl.value] ?? CITIES.tokyo;
      chartEl.classList.remove("is-ready");
      const params = new URLSearchParams({
        latitude: String(city.latitude),
        longitude: String(city.longitude),
        daily: "temperature_2m_max,temperature_2m_min",
        forecast_days: "7",
        timezone: "Asia/Tokyo"
      });
      const url = `https://api.open-meteo.com/v1/forecast?${params.toString()}`;
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      const data = await res.json();
      const maxTemps = data?.daily?.temperature_2m_max;
      const minTemps = data?.daily?.temperature_2m_min;
      const dates = data?.daily?.time;
      if (!Array.isArray(maxTemps) || !Array.isArray(minTemps) || !Array.isArray(dates) || maxTemps.length === 0) {
        throw new Error("daily weather data missing");
      }

      const counts = { cold: 0, warm: 0, cool: 0 };
      maxTemps.forEach((temp) => {
        counts[classify(temp)] += 1;
      });

      const label = buildLabel(counts);
      resultEl.classList.remove("is-loading");
      resultEl.classList.toggle("is-message", label.isMessage);
      leadEl.classList.toggle("is-hidden", label.isMessage);
      resultEl.innerHTML = label.html;
      chartEl.setAttribute("aria-label", `向こう1週間の${city.label}の最低気温と最高気温の推移`);
      renderChart(
        dates.map((date) => formatDay(date)),
        minTemps,
        maxTemps
      );
    };

    const handleLoadError = () => {
      resultEl.classList.add("is-loading");
      resultEl.textContent = "取得失敗";
      chartEl.classList.remove("is-ready");
      chartEl.innerHTML = "";
    };

    citySelectEl.addEventListener("change", () => {
      resultEl.classList.add("is-loading");
      resultEl.classList.remove("is-message");
      resultEl.textContent = "loading...";
      loadWeather().catch(handleLoadError);
    });

    loadWeather().catch(handleLoadError);
  </script>
</body>
</html>
