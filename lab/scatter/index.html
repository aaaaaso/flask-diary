<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Scatter plot</title>
  <meta name="description" content="データを雑にコピペして散布図を書く">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3f4f6;
      --ink: #1f2328;
      --accent: #3b3f45;
      --accent-2: #8f98a3;
      --card: #ffffff;
      --muted: #6b7280;
      --ring: rgba(31, 35, 40, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(1200px 500px at 10% -10%, rgba(31,35,40,0.08), transparent 60%),
        radial-gradient(900px 400px at 110% 10%, rgba(143,152,163,0.12), transparent 60%),
        var(--bg);
      color: var(--ink);
      font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
    }

    header {
      padding: 36px 22px 12px;
      max-width: 980px;
      margin: 0 auto;
    }

    h1 {
      margin: 0 0 8px;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-size: clamp(28px, 3vw, 40px);
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 22px 60px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--card);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 18px 50px rgba(31, 28, 23, 0.08);
      border: 1px solid var(--ring);
    }

    .grid {
      display: grid;
      gap: 16px;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    label {
      font-size: 13px;
      color: var(--muted);
      display: block;
      margin-bottom: 6px;
    }

    input[type="number"],
    input[type="text"] {
      width: 100%;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid var(--ring);
      background: white;
      font-size: 16px;
      font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid var(--ring);
      background: white;
      font-size: 16px;
      font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif;
    }

    textarea {
      width: 100%;
      min-height: 180px;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid var(--ring);
      background: white;
      font-size: 14px;
      font-family: "Noto Sans JP", system-ui, -apple-system, sans-serif;
      resize: vertical;
    }

    .toggle {
      display: inline-flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: var(--muted);
      margin-right: 12px;
    }

    .stats-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    .stats-table th,
    .stats-table td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--ring);
      text-align: left;
    }

    .stats-table th {
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .muted {
      color: var(--muted);
      font-size: 12px;
    }

    .error {
      color: #b42318;
      font-size: 13px;
      margin-top: 8px;
      min-height: 20px;
    }

    .chart-box {
      border: 1px solid var(--ring);
      border-radius: 8px;
      padding: 14px;
      background: #fafafa;
    }

    .chart-title {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .chart-title.is-custom {
      font-size: 18px;
      color: var(--ink);
      letter-spacing: 0.01em;
      text-transform: none;
    }

    #scatterChart {
      position: relative;
      aspect-ratio: 1 / 1;
    }

    #scatterChart svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .settings-stack {
      display: grid;
      gap: 14px;
    }

    .setting-label {
      margin: 0 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .setting-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .setting-section-title {
      margin: 10px 0 0;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
    }

    .advanced-settings {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px 10px;
      align-items: start;
    }

    .scatter-tooltip {
      position: absolute;
      z-index: 2;
      max-width: 320px;
      padding: 6px 8px;
      border-radius: 6px;
      background: rgba(31, 35, 40, 0.92);
      color: #f9fafb;
      font-size: 12px;
      line-height: 1.3;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -110%);
      transition: opacity 0.12s ease;
      white-space: nowrap;
    }

    .scatter-tooltip.show {
      opacity: 1;
    }

    .fade-in {
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <header class="fade-in">
    <h1>Scatter Plot</h1>
    <div class="subtitle">データをコピペで散布図を描写!</div>
  </header>

  <main>
    <section class="panel fade-in">
      <div class="grid">
        <div>
          <label for="dataInput">データ</label>
          <textarea id="dataInput" placeholder="表形式データを貼り付けてね（カンマ or タブ or 空白区切り）"></textarea>
          <label class="toggle" style="margin-top: 8px;">
            <input type="checkbox" id="hasHeader" checked />
            1行目をheaderとして扱う
          </label>
          <div class="muted" style="margin-top: 6px;" id="delimiterNote"></div>
          <div class="muted" style="margin-top: 6px;" id="skipNotice"></div>
          <div class="error" id="mainDataError"></div>
        </div>
        <div>
          <div class="muted" style="margin-bottom: 8px;">データ概要</div>
          <table class="stats-table">
            <thead>
              <tr><th>指標</th><th>値</th></tr>
            </thead>
            <tbody>
              <tr><td>行数</td><td id="parsedRows">-</td></tr>
              <tr><td>列数</td><td id="parsedCols">-</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </section>

    <section class="panel fade-in">
      <div class="chart-box">
        <div class="chart-title" id="chartTitle">Scatter</div>
        <div id="scatterChart"></div>
      </div>
    </section>

    <section class="panel fade-in">
      <div class="settings-stack">
        <div>
          <label for="plotTitle">タイトル</label>
          <input type="text" id="plotTitle" placeholder="グラフ上部に表示" />
        </div>
        <div>
          <div class="setting-label">x列:</div>
          <div class="setting-row">
            <div>
              <label for="xColumn">column</label>
              <select id="xColumn"></select>
            </div>
            <div>
              <label for="xAxisName">name</label>
              <input type="text" id="xAxisName" placeholder="空欄なら列名そのまま" />
            </div>
            <div>
              <label for="xUpper">upper</label>
              <input type="number" id="xUpper" step="any" placeholder="例: 30" />
            </div>
          </div>
        </div>
        <div>
          <div class="setting-label">y列:</div>
          <div class="setting-row">
            <div>
              <label for="yColumn">column</label>
              <select id="yColumn"></select>
            </div>
            <div>
              <label for="yAxisName">name</label>
              <input type="text" id="yAxisName" placeholder="空欄なら列名そのまま" />
            </div>
            <div>
              <label for="yUpper">upper</label>
              <input type="number" id="yUpper" step="any" placeholder="例: 20" />
            </div>
          </div>
        </div>
        <div>
          <div class="setting-label">label列</div>
          <div class="setting-row">
            <div>
              <select id="labelColumn">
                <option value="">なし</option>
              </select>
            </div>
            <div></div>
            <div></div>
          </div>
        </div>
        <div>
          <div class="setting-label">size列</div>
          <div class="setting-row">
            <div>
              <select id="sizeColumn">
                <option value="">なし</option>
              </select>
            </div>
            <div></div>
            <div></div>
          </div>
        </div>
        <div class="setting-section-title">高度な設定</div>
        <div class="advanced-settings">
          <div>
            <label for="figsize">縦横比を変更</label>
            <input type="text" id="figsize" value="2:1" placeholder="例: 2:1" />
          </div>
          <div>
            <label for="lineFormula">参照線を追加</label>
            <input type="text" id="lineFormula" placeholder="例: y=x/2+5" />
          </div>
          <div>
            <label for="highlightExpr">条件にあてはまるデータを強調</label>
            <input type="text" id="highlightExpr" placeholder="例: y>x" />
          </div>
          <div>
            <label for="filterExpr">条件でフィルタ</label>
            <input type="text" id="filterExpr" placeholder="例: a > 0 & b <= 100" />
            <div class="muted" style="margin-top: 6px;" id="detectedColumns"></div>
          </div>
          <div>
            <label class="toggle">
              <input type="checkbox" id="swapAxes" />
              x軸 / y軸を入れ替える
            </label>
            <label class="toggle">
              <input type="checkbox" id="jitter" />
              ジッターを有効化
            </label>
            <label class="toggle">
              <input type="checkbox" id="showTrendline" />
              トレンドラインを表示
            </label>
          </div>
        </div>
      </div>
      <div class="error" id="error"></div>
    </section>
  </main>

  <script>
    const MAX_COLUMNS = 30;
    let hasShownTooManyColumnsAlert = false;

    const formatNum = (v) => {
      if (!Number.isFinite(v)) return "-";
      return Number.isInteger(v) ? v.toFixed(0) : v.toFixed(2);
    };

    const escapeXml = (raw) => String(raw)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");

    const parseCellNumber = (raw, removeComma) => {
      const hasPercent = raw.includes("%");
      let cleaned = raw.trim();
      if (removeComma) cleaned = cleaned.replace(/,/g, "");
      if (hasPercent) cleaned = cleaned.replace(/%/g, "");
      const num = Number(cleaned);
      if (!Number.isFinite(num)) return NaN;
      return hasPercent ? num / 100 : num;
    };

    const parseFilterValue = (raw, removeComma) => {
      const maybeNum = parseCellNumber(raw, removeComma);
      if (Number.isFinite(maybeNum)) return maybeNum;
      const trimmed = raw.trim();
      if (/^true$/i.test(trimmed)) return true;
      if (/^false$/i.test(trimmed)) return false;
      if (/^null$/i.test(trimmed)) return null;
      return trimmed;
    };

    const splitRow = (line) => {
      if (line.includes("\t")) return line.split("\t");
      if (line.includes(",")) return line.split(",");
      return line.trim().split(/\s+/);
    };

    const parseTable = (raw, hasHeader) => {
      const hasTab = raw.includes("\t");
      const hasNewline = raw.includes("\n");
      const removeComma = hasTab || hasNewline;
      const lines = raw
        .replace(/\r\n?/g, "\n")
        .split("\n")
        .map((l) => l.trim())
        .filter((l) => l.length > 0);

      const rows = [];
      let maxCols = 0;
      if (lines.length === 0) {
        return {
          rows,
          maxCols,
          removeComma,
          headers: [],
        };
      }

      let startIndex = 0;
      let headCells = [];
      if (hasHeader) {
        headCells = splitRow(lines[0]).map((c) => c.trim()).slice(0, MAX_COLUMNS);
        maxCols = Math.max(maxCols, headCells.length);
        startIndex = 1;
      }

      for (let i = startIndex; i < lines.length; i += 1) {
        const cells = splitRow(lines[i]).map((c) => c.trim()).slice(0, MAX_COLUMNS);
        maxCols = Math.max(maxCols, cells.length);
        rows.push(cells);
      }

      let headers = [];
      if (hasHeader) {
        headers = Array.from({ length: maxCols }, (_, i) => {
          const v = headCells[i];
          return v && v.length > 0 ? v : `col${i + 1}`;
        });
      } else {
        headers = Array.from({ length: maxCols }, (_, i) => `col${i + 1}`);
      }
      return { rows, maxCols, removeComma, headers };
    };

    const normalizeFilterExpr = (rawExpr) => rawExpr
      .replace(/&&/g, "__AND__")
      .replace(/\|\|/g, "__OR__")
      .replace(/&/g, "&&")
      .replace(/\|/g, "||")
      .replace(/__AND__/g, "&&")
      .replace(/__OR__/g, "||");

    const normalizeEqualsOperator = (rawExpr) => rawExpr
      .replace(/!==/g, "__STRICT_NE__")
      .replace(/!=/g, "__NE__")
      .replace(/===/g, "__STRICT_EQ__")
      .replace(/==/g, "__EQ__")
      .replace(/<=/g, "__LE__")
      .replace(/>=/g, "__GE__")
      .replace(/=/g, "===")
      .replace(/__STRICT_NE__/g, "!==")
      .replace(/__NE__/g, "!=")
      .replace(/__STRICT_EQ__/g, "===")
      .replace(/__EQ__/g, "==")
      .replace(/__LE__/g, "<=")
      .replace(/__GE__/g, ">=");

    const normalizeConditionKeywords = (rawExpr) => rawExpr
      .replace(/\bTRUE\b/gi, "true")
      .replace(/\bFALSE\b/gi, "false")
      .replace(/\bNULL\b/gi, "null");

    const normalizeConditionExpr = (rawExpr, allowImplicitMultiplication = false) => {
      let expr = normalizeConditionKeywords(normalizeEqualsOperator(normalizeFilterExpr(String(rawExpr || "").trim())));
      if (allowImplicitMultiplication) expr = normalizeImplicitMultiplication(expr);
      return expr;
    };

    const normalizeImplicitMultiplication = (rawExpr) => String(rawExpr || "")
      .replace(/(\d)\s*([A-Za-z(])/g, "$1*$2")
      .replace(/([A-Za-z)])\s*(\d)/g, "$1*$2")
      .replace(/([xy)])\s*([xy(])/gi, "$1*$2");

    const buildColumnArgMap = (headers, maxCols, reservedNames = []) => {
      const argNames = [];
      const colToArg = [];
      const reserved = new Set(reservedNames);
      for (let i = 0; i < Math.min(maxCols, MAX_COLUMNS); i += 1) {
        const colArg = `col${i + 1}`;
        argNames.push(colArg);
        colToArg[i] = [colArg];
        const header = headers[i] || "";
        if (/^[A-Za-z_][A-Za-z0-9_]*$/.test(header) && header !== colArg && !reserved.has(header)) {
          argNames.push(header);
          colToArg[i].push(header);
        }
      }
      return { argNames, colToArg };
    };

    const buildFilterEvaluator = (rawExpr, headers, maxCols) => {
      if (!rawExpr || rawExpr.trim() === "") return null;
      const expr = normalizeConditionExpr(rawExpr);
      const allowedChars = /^[\w\s<>=!&|().,+\-*/%"'[\]]+$/;
      if (!allowedChars.test(expr)) {
        throw new Error("filter条件に使えない文字が含まれています。");
      }
      if (/\b(this|Function|constructor|globalThis|window|document|eval)\b/.test(expr)) {
        throw new Error("filter条件に使えないキーワードが含まれています。");
      }

      const { argNames, colToArg } = buildColumnArgMap(headers, maxCols);

      const tokens = expr.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [];
      const allowedNames = new Set(argNames.concat(["true", "false", "null"]));
      for (const t of tokens) {
        if (!allowedNames.has(t)) {
          throw new Error(`filter条件の列名 "${t}" を解釈できません。`);
        }
      }

      // eslint-disable-next-line no-new-func
      const fn = new Function(...argNames, `return (${expr});`);
      return (values) => {
        const valueMap = {};
        for (let i = 0; i < colToArg.length; i += 1) {
          const v = values[i];
          for (const name of colToArg[i]) {
            valueMap[name] = v;
          }
        }
        const args = argNames.map((n) => valueMap[n]);
        return Boolean(fn(...args));
      };
    };

    const setText = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.textContent = String(value);
    };

    const jitterOffset = (index, axisScale) => {
      const base = Math.sin((index + 1) * 12.9898) * 43758.5453;
      const frac = base - Math.floor(base);
      return (frac - 0.5) * axisScale;
    };

    const buildLineEvaluator = (rawFormula) => {
      if (!rawFormula || rawFormula.trim() === "") return null;
      let expr = rawFormula.trim();
      expr = expr.replace(/^y\s*=\s*/i, "");
      if (expr.length === 0) return null;

      const isSafe = /^[0-9xX+\-*/().,\s^a-zA-Z_]*$/.test(expr);
      if (!isSafe) throw new Error("関数は英数と + - * / () を使ってください。");

      const normalized = expr
        .replace(/\^/g, "**")
        .replace(/\b([a-zA-Z_]+)\s*\(/g, (m, fn) => {
          if (fn.toLowerCase() === "math") return m;
          return `Math.${fn}(`;
        })
        .replace(/\bx\b/gi, "x");

      // eslint-disable-next-line no-new-func
      const fn = new Function("x", `return (${normalized});`);
      return (x) => {
        const y = fn(x);
        return Number.isFinite(y) ? y : NaN;
      };
    };

    const buildHighlightEvaluator = (rawExpr, headers, maxCols) => {
      if (!rawExpr || rawExpr.trim() === "") return null;
      const expr = normalizeConditionExpr(rawExpr, true);
      const allowedChars = /^[\w\s<>=!&|().,+\-*/%"'[\]]+$/;
      if (!allowedChars.test(expr)) {
        throw new Error("強調条件に使えない文字が含まれています。");
      }
      if (/\b(this|Function|constructor|globalThis|window|document|eval)\b/.test(expr)) {
        throw new Error("強調条件に使えないキーワードが含まれています。");
      }
      const { argNames: columnArgNames, colToArg } = buildColumnArgMap(headers, maxCols, ["x", "y"]);
      const argNames = ["x", "y"].concat(columnArgNames);
      const tokens = expr.match(/[A-Za-z_][A-Za-z0-9_]*/g) || [];
      const allowedNames = new Set(argNames.concat(["true", "false", "null"]));
      for (const t of tokens) {
        if (!allowedNames.has(t)) {
          throw new Error(`強調条件の変数 "${t}" を解釈できません。x / y またはカラム名を使ってください。`);
        }
      }
      // eslint-disable-next-line no-new-func
      const fn = new Function(...argNames, `return (${expr});`);
      return (values, point = {}) => {
        const valueMap = {
          x: point.x,
          y: point.y,
        };
        for (let i = 0; i < colToArg.length; i += 1) {
          const v = values[i];
          for (const name of colToArg[i]) {
            valueMap[name] = v;
          }
        }
        const args = argNames.map((name) => valueMap[name]);
        return Boolean(fn(...args));
      };
    };

    const niceStep = (maxValue, targetTicks = 6) => {
      if (!Number.isFinite(maxValue) || maxValue <= 0) return 1;
      const raw = maxValue / Math.max(targetTicks, 2);
      const pow10 = Math.pow(10, Math.floor(Math.log10(raw)));
      const frac = raw / pow10;
      let niceFrac = 10;
      if (frac <= 1) niceFrac = 1;
      else if (frac <= 2) niceFrac = 2;
      else if (frac <= 5) niceFrac = 5;
      else niceFrac = 10;
      return niceFrac * pow10;
    };

    const buildTrendlineEvaluator = (points) => {
      if (!points || points.length < 2) return null;
      const n = points.length;
      let sumX = 0;
      let sumY = 0;
      let sumXX = 0;
      let sumXY = 0;
      for (const p of points) {
        sumX += p.x;
        sumY += p.y;
        sumXX += p.x * p.x;
        sumXY += p.x * p.y;
      }
      const denom = n * sumXX - sumX * sumX;
      if (!Number.isFinite(denom) || Math.abs(denom) < 1e-12) return null;
      const slope = (n * sumXY - sumX * sumY) / denom;
      const intercept = (sumY - slope * sumX) / n;
      if (!Number.isFinite(slope) || !Number.isFinite(intercept)) return null;
      return (x) => slope * x + intercept;
    };

    const findNumericColumnIndexes = (rows, maxCols, removeComma) => {
      const numericIndexes = [];
      for (let col = 0; col < Math.min(maxCols, MAX_COLUMNS); col += 1) {
        let hasValue = false;
        let allNumeric = true;
        for (const row of rows) {
          const raw = (row[col] ?? "").trim();
          if (raw === "") continue;
          hasValue = true;
          if (!Number.isFinite(parseCellNumber(raw, removeComma))) {
            allNumeric = false;
            break;
          }
        }
        if (hasValue && allNumeric) numericIndexes.push(col);
      }
      return numericIndexes;
    };

    const updateColumnSelectOptions = (selectId, headers, preferredIndex = 0, allowEmpty = false) => {
      const selectEl = document.getElementById(selectId);
      if (!selectEl) return "";
      const prev = selectEl.value;
      const options = allowEmpty ? ['<option value="">なし</option>'] : [];
      for (let i = 0; i < Math.min(headers.length, MAX_COLUMNS); i += 1) {
        const colName = headers[i] && headers[i].trim() !== "" ? headers[i] : `col${i + 1}`;
        options.push(`<option value="${i}">${colName}</option>`);
      }
      selectEl.innerHTML = options.join("");
      if (prev !== "" && Number.isInteger(Number(prev)) && Number(prev) < headers.length) {
        selectEl.value = prev;
      } else if (allowEmpty) {
        selectEl.value = preferredIndex === "" ? "" : String(preferredIndex);
      } else {
        selectEl.value = String(Math.min(preferredIndex, Math.max(headers.length - 1, 0)));
      }
      return selectEl.value;
    };

    const parseFigureSize = (raw) => {
      const text = String(raw || "").trim();
      if (text === "") return { widthRatio: 1, heightRatio: 1 };
      const match = text.match(/^(\d+(?:\.\d+)?)\s*:\s*(\d+(?:\.\d+)?)$/);
      if (!match) {
        throw new Error("figsize は 1:1 や 2:1 の形式で入力してください。");
      }
      const widthRatio = Number(match[1]);
      const heightRatio = Number(match[2]);
      if (!Number.isFinite(widthRatio) || !Number.isFinite(heightRatio) || widthRatio <= 0 || heightRatio <= 0) {
        throw new Error("figsize には正の数を指定してください。");
      }
      return { widthRatio, heightRatio };
    };

    const buildBubbleRadiusAccessor = (points) => {
      const sized = points
        .map((p) => p.sizeValue)
        .filter((v) => Number.isFinite(v) && v > 0);
      if (sized.length === 0) {
        return () => 4;
      }
      const minRadius = 4;
      const maxRadius = 18;
      const minValue = Math.min(...sized);
      const maxValue = Math.max(...sized);
      if (Math.abs(maxValue - minValue) < 1e-12) {
        return (p) => (Number.isFinite(p.sizeValue) && p.sizeValue > 0 ? 10 : minRadius);
      }
      const minRoot = Math.sqrt(minValue);
      const maxRoot = Math.sqrt(maxValue);
      return (p) => {
        if (!Number.isFinite(p.sizeValue) || p.sizeValue <= 0) return minRadius;
        const scaled = (Math.sqrt(p.sizeValue) - minRoot) / (maxRoot - minRoot);
        return minRadius + scaled * (maxRadius - minRadius);
      };
    };

    const renderScatter = (
      points,
      xLabel,
      yLabel,
      jitterOn,
      lineEval,
      labelHeader,
      showTrendline,
      figureSize,
      xUpper,
      yUpper
    ) => {
      const container = document.getElementById("scatterChart");
      if (points.length === 0) {
        container.innerHTML = '<div class="muted">描写できる点がありません。</div>';
        return;
      }

      const width = 640;
      const height = Math.max(220, Math.round(width * (figureSize.heightRatio / figureSize.widthRatio)));
      const pad = { top: 24, right: 24, bottom: 56, left: 60 };
      const innerW = width - pad.left - pad.right;
      const innerH = height - pad.top - pad.bottom;

      const minX = 0;
      const minY = 0;
      const maxXData = Math.max(...points.map((p) => p.x));
      const maxYData = Math.max(...points.map((p) => p.y));
      const maxXVisible = Number.isFinite(xUpper) ? Math.max(maxXData, xUpper) : maxXData;
      const maxYVisible = Number.isFinite(yUpper) ? Math.max(maxYData, yUpper) : maxYData;
      const xStep = niceStep(maxXVisible);
      const yStep = niceStep(maxYVisible);
      const maxX = Math.max(xStep, Math.ceil(Math.max(maxXVisible, 0) / xStep) * xStep);
      const maxY = Math.max(yStep, Math.ceil(Math.max(maxYVisible, 0) / yStep) * yStep);

      const spanX = maxX - minX;
      const spanY = maxY - minY;
      const xFor = (x) => pad.left + ((x - minX) / spanX) * innerW;
      const yFor = (y) => pad.top + innerH - ((y - minY) / spanY) * innerH;
      const jitterX = jitterOn ? Math.max(spanX * 0.01, 0.005) : 0;
      const jitterY = jitterOn ? Math.max(spanY * 0.01, 0.005) : 0;

      const gridLines = [];
      for (let xTick = 0; xTick <= maxX + xStep / 2; xTick += xStep) {
        const px = xFor(xTick);
        gridLines.push(
          `<line x1="${px}" y1="${pad.top}" x2="${px}" y2="${pad.top + innerH}" stroke="rgba(31,35,40,0.08)" />`,
          `<text x="${px}" y="${pad.top + innerH + 18}" text-anchor="middle" font-size="11" fill="#6b7280">${formatNum(xTick)}</text>`
        );
      }
      for (let yTick = 0; yTick <= maxY + yStep / 2; yTick += yStep) {
        const py = yFor(yTick);
        gridLines.push(
          `<line x1="${pad.left}" y1="${py}" x2="${pad.left + innerW}" y2="${py}" stroke="rgba(31,35,40,0.08)" />`,
          `<text x="${pad.left - 8}" y="${py + 4}" text-anchor="end" font-size="11" fill="#6b7280">${formatNum(yTick)}</text>`
        );
      }

      const radiusFor = buildBubbleRadiusAccessor(points);
      const pointMarks = points
        .map((p, idx) => {
          const jx = jitterOffset(idx, jitterX);
          const jy = jitterOffset(idx + 999, jitterY);
          const cx = xFor(p.x + jx);
          const cy = yFor(p.y + jy);
          const radius = radiusFor(p);
          const labelText = labelHeader && p.label ? `${p.label} ` : "";
          const sizeText = Number.isFinite(p.sizeValue) && p.sizeValue > 0 ? ` size=${formatNum(p.sizeValue)}` : "";
          const title = `${labelText}(${formatNum(p.x)}, ${formatNum(p.y)})${sizeText}`;
          const fill = p.highlight ? "#44A194" : "#3b3f45";
          return {
            highlight: p.highlight,
            svg: `<circle class="scatter-point" cx="${cx}" cy="${cy}" r="${radius}" fill="${fill}" opacity="0.78" data-tip="${escapeXml(title)}"><title>${escapeXml(title)}</title></circle>`,
          };
        });
      const dots = pointMarks
        .filter((mark) => !mark.highlight)
        .concat(pointMarks.filter((mark) => mark.highlight))
        .map((mark) => mark.svg)
        .join("");

      const buildFunctionPath = (fn, stroke, strokeWidth, dasharray = "") => {
        if (!fn) return "";
        const segments = [];
        const steps = 180;
        let current = [];
        for (let i = 0; i <= steps; i += 1) {
          const x = (maxX * i) / steps;
          const y = fn(x);
          if (!Number.isFinite(y)) {
            if (current.length > 1) segments.push(current);
            current = [];
            continue;
          }
          const cx = xFor(x);
          const cy = yFor(y);
          if (cy < pad.top - 1 || cy > pad.top + innerH + 1) {
            if (current.length > 1) segments.push(current);
            current = [];
            continue;
          }
          current.push(`${cx},${cy}`);
        }
        if (current.length > 1) segments.push(current);
        return segments
          .map((pts) => `<polyline points="${pts.join(" ")}" fill="none" stroke="${stroke}" stroke-width="${strokeWidth}"${dasharray ? ` stroke-dasharray="${dasharray}"` : ""} />`)
          .join("");
      };

      const linePath = buildFunctionPath(lineEval, "#8f98a3", 2, "6 6");
      const trendEval = showTrendline ? buildTrendlineEvaluator(points) : null;
      const trendPath = buildFunctionPath(trendEval, "#9ca3af", 1.2);

      container.innerHTML = [
        `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="Scatter plot">`,
        `<rect x="0" y="0" width="${width}" height="${height}" fill="transparent" />`,
        ...gridLines,
        `<line x1="${pad.left}" y1="${pad.top + innerH}" x2="${pad.left + innerW}" y2="${pad.top + innerH}" stroke="rgba(31,35,40,0.26)" />`,
        `<line x1="${pad.left}" y1="${pad.top}" x2="${pad.left}" y2="${pad.top + innerH}" stroke="rgba(31,35,40,0.26)" />`,
        linePath,
        trendPath,
        dots,
        `<text x="${pad.left + innerW / 2}" y="${height - 12}" text-anchor="middle" font-size="12" fill="#4b5563">${xLabel}</text>`,
        `<text x="16" y="${pad.top + innerH / 2}" text-anchor="middle" font-size="12" fill="#4b5563" transform="rotate(-90 16 ${pad.top + innerH / 2})">${yLabel}</text>`,
        `</svg>`,
      ].join("");

      const tooltip = document.createElement("div");
      tooltip.className = "scatter-tooltip";
      container.appendChild(tooltip);

      const pointEls = container.querySelectorAll(".scatter-point");
      pointEls.forEach((el) => {
        el.addEventListener("mouseenter", () => {
          tooltip.textContent = el.getAttribute("data-tip") || "";
          tooltip.classList.add("show");
        });
        el.addEventListener("mouseleave", () => {
          tooltip.classList.remove("show");
        });
        el.addEventListener("mousemove", (ev) => {
          const rect = container.getBoundingClientRect();
          const x = ev.clientX - rect.left;
          const y = ev.clientY - rect.top;
          tooltip.style.left = `${x}px`;
          tooltip.style.top = `${y}px`;
        });
      });
    };

    const build = () => {
      const raw = document.getElementById("dataInput").value;
      const plotTitle = document.getElementById("plotTitle").value.trim();
      const figsizeRaw = document.getElementById("figsize").value.trim();
      const highlightExpr = document.getElementById("highlightExpr").value.trim();
      const hasHeader = document.getElementById("hasHeader").checked;
      const swapAxes = document.getElementById("swapAxes").checked;
      const jitterOn = document.getElementById("jitter").checked;
      const showTrendline = document.getElementById("showTrendline").checked;
      const filterExpr = document.getElementById("filterExpr").value;
      const lineFormula = document.getElementById("lineFormula").value;
      const xUpperRaw = document.getElementById("xUpper").value.trim();
      const yUpperRaw = document.getElementById("yUpper").value.trim();
      const xAxisName = document.getElementById("xAxisName").value.trim();
      const yAxisName = document.getElementById("yAxisName").value.trim();
      const errorEl = document.getElementById("error");
      const mainDataErrorEl = document.getElementById("mainDataError");
      const detectedColumnsEl = document.getElementById("detectedColumns");
      const noteEl = document.getElementById("delimiterNote");
      const chartTitleEl = document.getElementById("chartTitle");
      const scatterChartEl = document.getElementById("scatterChart");

      errorEl.textContent = "";
      if (mainDataErrorEl) mainDataErrorEl.textContent = "";
      if (chartTitleEl) {
        chartTitleEl.textContent = plotTitle || "Scatter";
        chartTitleEl.classList.toggle("is-custom", plotTitle !== "");
      }
      let figureSize = { widthRatio: 1, heightRatio: 1 };
      try {
        figureSize = parseFigureSize(figsizeRaw || "1:1");
      } catch (e) {
        errorEl.textContent = e instanceof Error ? e.message : "figsize の解釈に失敗しました。";
        if (scatterChartEl) scatterChartEl.innerHTML = "";
        return;
      }
      if (scatterChartEl) {
        scatterChartEl.style.aspectRatio = `${figureSize.widthRatio} / ${figureSize.heightRatio}`;
      }
      const hasTab = raw.includes("\t");
      const hasComma = raw.includes(",");
      const hasPercent = /(^|[\s,\t])[-+]?\d[\d,]*(\.\d+)?\s*%/.test(raw);
      const hasMainInput = raw.trim().length > 0;
      const notes = [];
      if (hasMainInput) {
        notes.push(
          hasTab
            ? "タブ区切りとして検出しています。"
            : hasComma
              ? "カンマ区切りとして検出しています。"
              : "空白区切りとして検出しています。"
        );
        if (hasPercent) notes.push("百分率に直して扱います。");
        if (hasComma && (hasTab || raw.includes("\n"))) {
          notes.push("カンマは除去して扱います。");
        }
      }
      noteEl.textContent = notes.join(" ");

      const xUpper = xUpperRaw === "" ? NaN : Number(xUpperRaw);
      const yUpper = yUpperRaw === "" ? NaN : Number(yUpperRaw);
      if ((xUpperRaw !== "" && !Number.isFinite(xUpper)) || (yUpperRaw !== "" && !Number.isFinite(yUpper))) {
        errorEl.textContent = "x upper / y upper には数値を入力してください。";
        return;
      }
      let lineEval = null;
      try {
        lineEval = buildLineEvaluator(lineFormula);
      } catch (e) {
        errorEl.textContent = e instanceof Error ? e.message : "関数の解釈に失敗しました。";
        return;
      }

      const parsed = parseTable(raw, hasHeader);
      if (!hasMainInput) {
        updateColumnSelectOptions("xColumn", [], 0, false);
        updateColumnSelectOptions("yColumn", [], 0, false);
        updateColumnSelectOptions("labelColumn", [], "", true);
        updateColumnSelectOptions("sizeColumn", [], "", true);
        setText("parsedRows", "-");
        setText("parsedCols", "-");
        if (detectedColumnsEl) detectedColumnsEl.textContent = "";
        const skipNoticeEl = document.getElementById("skipNotice");
        if (skipNoticeEl) skipNoticeEl.textContent = "";
        if (scatterChartEl) scatterChartEl.innerHTML = "";
        return;
      }
      const normalizedLines = raw
        .replace(/\r\n?/g, "\n")
        .split("\n")
        .map((l) => l.trim())
        .filter((l) => l.length > 0);
      const tooManyColumns = normalizedLines.some((line) => splitRow(line).length > MAX_COLUMNS);
      if (tooManyColumns) {
        if (mainDataErrorEl) mainDataErrorEl.textContent = `30列を超えています。`;
        if (scatterChartEl) scatterChartEl.innerHTML = "";
        if (!hasShownTooManyColumnsAlert) {
          window.alert("30列を超えています");
          hasShownTooManyColumnsAlert = true;
        }
        return;
      }
      hasShownTooManyColumnsAlert = false;
      if (parsed.maxCols < 2) {
        if (mainDataErrorEl) mainDataErrorEl.textContent = "2列以上のデータを貼り付けてください。";
        if (scatterChartEl) scatterChartEl.innerHTML = "";
        return;
      }
      const mergedHeaders = parsed.headers.slice(0, MAX_COLUMNS);
      if (detectedColumnsEl) {
        const hasAnyInput = raw.trim().length > 0;
        detectedColumnsEl.textContent = hasAnyInput
          ? `検出カラム: ${mergedHeaders.join(", ")}`
          : "";
      }
      const mergedMaxCols = Math.min(MAX_COLUMNS, Math.max(2, mergedHeaders.length));
      const numericIndexes = findNumericColumnIndexes(parsed.rows, mergedMaxCols, parsed.removeComma);
      const defaultX = numericIndexes[0] ?? 0;
      let defaultY = numericIndexes[1] ?? (mergedHeaders.length > 1 ? 1 : 0);
      if (defaultY === defaultX && mergedHeaders.length > 1) {
        defaultY = defaultX === 0 ? 1 : 0;
      }
      const selectedXColRaw = updateColumnSelectOptions("xColumn", mergedHeaders, defaultX, false);
      const selectedYColRaw = updateColumnSelectOptions("yColumn", mergedHeaders, defaultY, false);
      const selectedLabelColRaw = updateColumnSelectOptions("labelColumn", mergedHeaders, "", true);
      const selectedSizeColRaw = updateColumnSelectOptions("sizeColumn", mergedHeaders, "", true);
      const selectedXCol = Number(selectedXColRaw);
      const selectedYCol = Number(selectedYColRaw);
      const selectedLabelCol = selectedLabelColRaw === "" ? -1 : Number(selectedLabelColRaw);
      const selectedSizeCol = selectedSizeColRaw === "" ? -1 : Number(selectedSizeColRaw);

      if (!Number.isInteger(selectedXCol) || !Number.isInteger(selectedYCol)) {
        if (mainDataErrorEl) mainDataErrorEl.textContent = "x列 / y列 を選択してください。";
        if (scatterChartEl) scatterChartEl.innerHTML = "";
        return;
      }
      if (selectedXCol === selectedYCol) {
        if (mainDataErrorEl) mainDataErrorEl.textContent = "x列 と y列 は別のカラムを選択してください。";
        if (scatterChartEl) scatterChartEl.innerHTML = "";
        return;
      }

      let rows = parsed.rows.map((cells) => ({
        cells,
        filterValues: mergedHeaders.map((_, idx) => parseFilterValue(cells[idx] ?? "", parsed.removeComma)),
      }));

      let filterEval = null;
      try {
        filterEval = buildFilterEvaluator(filterExpr, mergedHeaders, mergedMaxCols);
      } catch (e) {
        errorEl.textContent = e instanceof Error ? e.message : "filter条件の解釈に失敗しました。";
        return;
      }
      let highlightEval = null;
      try {
        highlightEval = buildHighlightEvaluator(highlightExpr, mergedHeaders, mergedMaxCols);
      } catch (e) {
        errorEl.textContent = e instanceof Error ? e.message : "強調条件の解釈に失敗しました。";
        return;
      }
      const skipNoticeEl = document.getElementById("skipNotice");
      const labelHeader = selectedLabelCol >= 0 ? (mergedHeaders[selectedLabelCol] || `col${selectedLabelCol + 1}`) : "";
      let xLabel = xAxisName || mergedHeaders[selectedXCol] || `col${selectedXCol + 1}`;
      let yLabel = yAxisName || mergedHeaders[selectedYCol] || `col${selectedYCol + 1}`;

      const filteredRows = filterEval
        ? rows.filter((r) => filterEval(r.filterValues))
        : rows;

      let skipped = 0;
      let numericRows = filteredRows.map((r) => {
        const x = parseCellNumber(r.cells[selectedXCol] ?? "", parsed.removeComma);
        const y = parseCellNumber(r.cells[selectedYCol] ?? "", parsed.removeComma);
        if (!Number.isFinite(x) || !Number.isFinite(y)) {
          skipped += 1;
          return null;
        }
        return {
          ...r,
          x,
          y,
          sizeValue: selectedSizeCol >= 0 ? parseCellNumber(r.cells[selectedSizeCol] ?? "", parsed.removeComma) : NaN,
        };
      }).filter(Boolean);

      if (swapAxes) {
        numericRows = numericRows.map((r) => ({ ...r, x: r.y, y: r.x }));
        const tmp = xLabel;
        xLabel = yLabel;
        yLabel = tmp;
      }

      const plotted = numericRows.filter((r) => {
        if (Number.isFinite(xUpper) && r.x > xUpper) return false;
        if (Number.isFinite(yUpper) && r.y > yUpper) return false;
        return true;
      }).map((r) => {
        const highlight = highlightEval ? highlightEval(r.filterValues, { x: r.x, y: r.y }) : false;
        if (selectedLabelCol < 0 || !Number.isInteger(selectedLabelCol)) return { ...r, label: "", highlight };
        const rawLabel = r.cells[selectedLabelCol] ?? "";
        return { ...r, label: rawLabel, highlight };
      });

      setText("parsedRows", parsed.rows.length);
      setText("parsedCols", mergedHeaders.length);
      if (skipNoticeEl) {
        skipNoticeEl.textContent = skipped > 0
          ? `選択した x列 / y列 を数値として読めなかったデータはスキップしました（${skipped}件）`
          : "";
      }

      renderScatter(
        plotted,
        xLabel,
        yLabel,
        jitterOn,
        lineEval,
        labelHeader,
        showTrendline,
        figureSize,
        xUpper,
        yUpper
      );
    };

    const debounce = (fn, wait = 180) => {
      let t = null;
      return (...args) => {
        window.clearTimeout(t);
        t = window.setTimeout(() => fn(...args), wait);
      };
    };

    const debouncedBuild = debounce(build, 180);

    document.getElementById("dataInput").addEventListener("input", debouncedBuild);
    document.getElementById("hasHeader").addEventListener("change", build);
    document.getElementById("plotTitle").addEventListener("input", debouncedBuild);
    document.getElementById("figsize").addEventListener("input", debouncedBuild);
    document.getElementById("xColumn").addEventListener("change", build);
    document.getElementById("xAxisName").addEventListener("input", debouncedBuild);
    document.getElementById("yColumn").addEventListener("change", build);
    document.getElementById("yAxisName").addEventListener("input", debouncedBuild);
    document.getElementById("swapAxes").addEventListener("change", build);
    document.getElementById("jitter").addEventListener("change", build);
    document.getElementById("showTrendline").addEventListener("change", build);
    document.getElementById("labelColumn").addEventListener("change", build);
    document.getElementById("sizeColumn").addEventListener("change", build);
    document.getElementById("highlightExpr").addEventListener("input", debouncedBuild);
    document.getElementById("filterExpr").addEventListener("input", debouncedBuild);
    document.getElementById("lineFormula").addEventListener("input", debouncedBuild);
    document.getElementById("xUpper").addEventListener("input", debouncedBuild);
    document.getElementById("yUpper").addEventListener("input", debouncedBuild);

    build();
  </script>
</body>
</html>
