<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>super tetris</title>
    <meta name="description" content="テトリス好きの友人にプレイさせるためにつくった。" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="panel game-panel">
        <div class="controls top-controls">
          <button id="startBtn" class="btn">Start</button>
          <button id="restartBtn" class="btn secondary">Restart</button>
          <button id="pauseBtn" class="btn tertiary">Pause</button>
          <div class="bgm-switch" aria-label="bgm switch">
            <button class="bgm-btn is-active" data-bgm-src="./wind_bg.mp3" aria-label="wind bgm">
              <img src="./wind.png" alt="" />
            </button>
            <button class="bgm-btn" data-bgm-src="./morning_bg.mp3" aria-label="morning bgm">
              <img src="./morning.png" alt="" />
            </button>
            <button class="bgm-btn" data-bgm-src="./bird_bg.mp3" aria-label="bird bgm">
              <img src="./bird.png" alt="" />
            </button>
            <button class="bgm-btn" data-bgm-src="./fire_bg.mp3" aria-label="fire bgm">
              <img src="./fire.png" alt="" />
            </button>
          </div>
        </div>
        <div class="board-wrap">
          <canvas id="board" width="320" height="704" aria-label="tetris board"></canvas>
          <div id="overlay" class="overlay hidden"></div>
        </div>
      </section>

      <aside class="panel side-panel">
        <div class="stat stat-score">
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div class="stat stat-lines">
          <span>Lines</span>
          <strong id="lines">0</strong>
        </div>
        <div class="stat stat-level">
          <span>Level</span>
          <strong id="level">1</strong>
        </div>

        <section class="next-wrap">
          <h2>Next</h2>
          <div class="preview-wrap">
            <canvas id="next" width="192" height="192" aria-label="next piece"></canvas>
            <div class="conceal-layer"></div>
          </div>
        </section>
        <section class="next-wrap">
          <h2>Hold</h2>
          <div class="preview-wrap">
            <canvas id="hold" width="192" height="192" aria-label="hold piece"></canvas>
            <div class="conceal-layer"></div>
          </div>
        </section>
        <span class="hint">← 左移動<br />→ 右移動<br />↓ 1マス落下<br />↑ ハードドロップ<br />Z 左回転 / X 右回転<br />SPACE ホールド<br />P ポーズ</span>
        <div class="mobile-side-controls" aria-label="mobile side controls">
          <div class="mobile-game-controls">
            <button class="btn mobile-game-btn" data-mobile-action="start">Start</button>
            <button class="btn secondary mobile-game-btn" data-mobile-action="restart">Restart</button>
            <button class="btn tertiary mobile-game-btn" data-mobile-action="pause">Pause</button>
          </div>
          <div class="mobile-bgm-controls">
            <button class="bgm-btn" data-bgm-src="./wind_bg.mp3" aria-label="wind bgm">
              <img src="./wind.png" alt="" />
            </button>
            <button class="bgm-btn" data-bgm-src="./morning_bg.mp3" aria-label="morning bgm">
              <img src="./morning.png" alt="" />
            </button>
            <button class="bgm-btn" data-bgm-src="./bird_bg.mp3" aria-label="bird bgm">
              <img src="./bird.png" alt="" />
            </button>
            <button class="bgm-btn" data-bgm-src="./fire_bg.mp3" aria-label="fire bgm">
              <img src="./fire.png" alt="" />
            </button>
          </div>
        </div>
      </aside>
    </main>
    <section id="touchPanel" class="touch-panel" aria-label="touch controls">
      <div class="touch-layout">
        <div class="touch-pad touch-pad-left">
          <button class="touch-btn hold-btn" data-action="hold" aria-label="hold">
            <img src="./hold.png" alt="" />
          </button>
          <button class="touch-btn" data-action="rot-left" aria-label="rotate left">
            <img src="./rotate-left.png" alt="" />
          </button>
          <button class="touch-btn" data-action="rot-right" aria-label="rotate right">
            <img src="./rotate-right.png" alt="" />
          </button>
        </div>
        <div class="touch-pad touch-pad-right">
          <button class="touch-btn arrow up" data-action="hard-drop" aria-label="hard drop">
            <img src="./right-arrow.png" alt="" />
          </button>
          <button class="touch-btn arrow left" data-action="left" aria-label="move left">
            <img src="./right-arrow.png" alt="" />
          </button>
          <button class="touch-btn arrow down" data-action="down" aria-label="soft drop">
            <img src="./right-arrow.png" alt="" />
          </button>
          <button class="touch-btn arrow right" data-action="right" aria-label="move right">
            <img src="./right-arrow.png" alt="" />
          </button>
        </div>
      </div>
    </section>

    <audio id="bgm" src="./wind_bg.mp3" loop preload="auto"></audio>
    <audio id="bgmAlt" loop preload="auto"></audio>
    <audio id="sfxDrop" src="./drop.mp3" preload="auto"></audio>
    <audio id="sfxRotate" src="./rot2.mp3" preload="auto"></audio>
    <audio id="sfxMove" src="./move.mp3" preload="auto"></audio>
    <audio id="sfxHold" src="./hold.mp3" preload="auto"></audio>
    <audio id="sfx2dan" src="./2dan.mp3" preload="auto"></audio>
    <audio id="sfx2danClear" src="./2dan_clear.mp3" preload="auto"></audio>
    <audio id="sfxClear" src="./clear.mp3" preload="auto"></audio>
    <audio id="sfxClearBig" src="./clear_big.mp3" preload="auto"></audio>
    <audio id="sfxGameOver" src="./gameover.mp3" preload="auto"></audio>
    <audio id="sfxGameClear" src="./gameclear.mp3" preload="auto"></audio>
    <audio id="sfxBell" src="./bell.mp3" preload="auto"></audio>
    <script src="./script.js"></script>
  </body>
</html>
