<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Haptic Feedback Playground</title>
  <meta name="description" content="Vibration API + iOS checkbox trickで触覚フィードバックを試せるページ" />
  <style>
    :root {
      --bg: #f5f2e9;
      --panel: #fffdf8;
      --ink: #1f1b16;
      --muted: #72685d;
      --line: #dfd5c6;
      --accent: #d05f34;
      --accent-2: #3b7a57;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100dvh;
      color: var(--ink);
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      background:
        radial-gradient(1200px 420px at -10% 0%, #efe8dc 20%, transparent 70%),
        radial-gradient(900px 320px at 120% -10%, #f3dfca 18%, transparent 68%),
        var(--bg);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: 0 18px 40px rgba(77, 64, 50, 0.08);
      padding: 24px;
      animation: fade-up 500ms ease both;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 4vw, 34px);
      letter-spacing: 0.02em;
    }

    p {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .chip {
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: #5e5042;
      background: #fff;
    }

    .actions {
      margin-top: 20px;
      display: grid;
      gap: 10px;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    }

    button {
      border: 1px solid #cdb7a0;
      background: #fff;
      color: var(--ink);
      border-radius: 10px;
      min-height: 48px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 120ms ease, border-color 120ms ease, box-shadow 120ms ease;
    }

    button:hover {
      border-color: #b58c6f;
      box-shadow: 0 7px 18px rgba(48, 31, 14, 0.12);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(1px) scale(0.99);
    }

    .primary {
      border-color: #cb7b55;
      background: linear-gradient(180deg, #d9794f, #cd5e31);
      color: #fff;
    }

    .secondary {
      border-color: #72a488;
      background: linear-gradient(180deg, #6ba985, #4e8f68);
      color: #fff;
    }

    .log {
      margin-top: 16px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      font-size: 13px;
      color: #4f453d;
      min-height: 44px;
    }

    .toggle-row {
      margin-top: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #5d5145;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Haptic Feedback Playground</h1>
    <p>
      chanhdaiの説明に合わせて、<strong>Vibration API</strong> と
      <strong>iOS checkbox trick</strong> を組み合わせたテストページです。
    </p>

    <div class="chips">
      <span class="chip" id="device-chip">Device: checking...</span>
      <span class="chip" id="vibrate-chip">Vibrate API: checking...</span>
      <span class="chip">Route: /lab/haptic/</span>
    </div>

    <div class="actions">
      <button class="primary" data-type="light">Light</button>
      <button data-type="medium">Medium</button>
      <button data-type="heavy">Heavy</button>
      <button class="secondary" data-type="success">Success</button>
      <button data-type="warning">Warning</button>
      <button data-type="error">Error</button>
    </div>

    <div class="toggle-row">
      <input type="checkbox" id="iosFallbackToggle" checked />
      <label for="iosFallbackToggle">iOS checkbox trick を有効にする</label>
    </div>

    <div id="log" class="log">ボタンを押して触覚フィードバックを試してください。</div>
  </main>

  <script>
    const isIOS = /iP(hone|od|ad)/.test(navigator.userAgent) ||
      (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const supportsVibrate = typeof navigator.vibrate === 'function';

    const deviceChip = document.getElementById('device-chip');
    const vibrateChip = document.getElementById('vibrate-chip');
    const logEl = document.getElementById('log');
    const iosFallbackToggle = document.getElementById('iosFallbackToggle');

    deviceChip.textContent = `Device: ${isIOS ? 'iOS or iPadOS' : 'Non-iOS'}`;
    vibrateChip.textContent = `Vibrate API: ${supportsVibrate ? 'available' : 'not available'}`;

    const hiddenCheckbox = document.createElement('input');
    hiddenCheckbox.type = 'checkbox';
    hiddenCheckbox.setAttribute('aria-hidden', 'true');
    hiddenCheckbox.tabIndex = -1;
    hiddenCheckbox.style.position = 'fixed';
    hiddenCheckbox.style.opacity = '0';
    hiddenCheckbox.style.pointerEvents = 'none';
    hiddenCheckbox.style.width = '1px';
    hiddenCheckbox.style.height = '1px';
    hiddenCheckbox.style.left = '-100px';
    document.body.appendChild(hiddenCheckbox);

    const patterns = {
      light: 12,
      medium: 24,
      heavy: 45,
      success: [18, 40, 18],
      warning: [30, 25, 20, 25, 20],
      error: [50, 25, 50]
    };

    function triggerIOSCheckboxTrick() {
      hiddenCheckbox.click();
    }

    function haptic(type = 'light') {
      const pattern = patterns[type] || patterns.light;

      if (supportsVibrate) {
        navigator.vibrate(pattern);
      }

      if (isIOS && iosFallbackToggle.checked) {
        triggerIOSCheckboxTrick();
      }

      const patternText = Array.isArray(pattern) ? `[${pattern.join(', ')}]` : `${pattern}`;
      logEl.textContent = `Triggered: ${type} / pattern=${patternText} / iOS fallback=${isIOS && iosFallbackToggle.checked}`;
    }

    document.querySelectorAll('button[data-type]').forEach((button) => {
      button.addEventListener('click', () => {
        haptic(button.dataset.type);
      });
    });
  </script>
</body>
</html>
