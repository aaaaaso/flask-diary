<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lab Index</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <style>
    :root {
      --bg: #d8dde1;
      --bg-deep: #cfd5da;
      --panel: #dbe0e5;
      --panel-strong: #d3d9de;
      --ink: #434b55;
      --muted: #707984;
      --ring: rgba(67, 75, 85, 0.08);
      --outer-shadow:
        6px 6px 12px rgba(152, 160, 170, 0.38),
        -6px -6px 12px rgba(241, 249, 249, 0.56);
      --outer-shadow-soft:
        3px 3px 8px rgba(152, 160, 170, 0.28),
        -3px -3px 8px rgba(241, 249, 249, 0.5);
      --inner-shadow:
        inset 6px 6px 12px rgba(166, 173, 181, 0.32),
        inset -1px -1px 2px rgba(241, 249, 249, 0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 18% 14%, rgba(241, 249, 249, 0.82), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.34), transparent 22%),
        linear-gradient(145deg, var(--bg) 0%, var(--bg-deep) 100%);
      color: var(--ink);
      font-family: "Futura", "Avenir Next", "Avenir", "Century Gothic", sans-serif;
      min-height: 100vh;
      background-attachment: fixed;
    }

    header {
      max-width: 980px;
      margin: 0 auto;
      padding: 40px 22px 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 3vw, 42px);
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .subtitle {
      color: var(--muted);
      font-size: 14px;
    }

    main {
      max-width: 980px;
      margin: 0 auto;
      padding: 12px 22px 60px;
      display: grid;
      gap: 18px;
    }

    .panel {
      background: var(--panel);
      border-radius: 24px;
      padding: 20px;
      border: 1px solid var(--ring);
      box-shadow: var(--outer-shadow);
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    }

    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--ring);
      border-radius: 20px;
      padding: 16px 18px;
      background: var(--panel-strong);
      box-shadow: var(--outer-shadow-soft);
      transition: transform 0.15s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    a.card:hover {
      transform: translateY(-2px);
      box-shadow:
        5px 5px 10px rgba(152, 160, 170, 0.3),
        -5px -5px 10px rgba(241, 249, 249, 0.56);
      border-color: rgba(255, 255, 255, 0.2);
    }

    .card-title {
      font-weight: 600;
      letter-spacing: 0.02em;
      margin: 0 0 8px;
      font-size: 1.02rem;
    }

    .card-desc {
      font-size: 0.88rem;
      color: var(--muted);
      margin: 0;
      line-height: 1.6;
    }

    .note {
      font-size: 0.84rem;
      color: var(--muted);
      margin: 0;
    }

    @media (max-width: 760px) {
      header {
        padding-top: 28px;
      }

      main {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Lab</h1>
  </header>

  <main>
    <section class="panel">
      {% if experiments %}
        <div class="grid">
          {% for exp in experiments %}
            <a class="card" href="/lab/{{ exp.name }}/">
              <div class="card-title">{{ exp.title }}</div>
              <p class="card-desc">{{ exp.desc }}</p>
            </a>
          {% endfor %}
        </div>
      {% else %}
        <p class="note">まだ実験がありません（lab/&lt;name&gt;/index.html を追加してください）。</p>
      {% endif %}
    </section>
  </main>

</body>
</html>
