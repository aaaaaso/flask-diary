<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>mytimeline editor</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='aos.css') }}">
  <meta name="robots" content="noindex,nofollow,noarchive">
</head>
<body class="timeline-page">
  <div class="timeline-wrap">
    <section class="timeline-editor" data-aos="fade-up">
      {% if error_message %}
        <p class="timeline-error">{{ error_message }}</p>
      {% endif %}
      <form method="post" enctype="multipart/form-data" class="timeline-form" id="timeline-compose-form" action="{{ url_for('mytimeline_edit', token=token, q=search_query or None) }}">
        <div class="timeline-composer">
          <textarea
            id="content"
            name="content"
            rows="4"
            maxlength="100"
            placeholder="メモだからね、推敲しないこと"
            required
          ></textarea>
          <input
            id="timeline-image-input"
            class="timeline-image-input"
            type="file"
            name="image"
            accept="image/jpeg,image/png,image/webp,image/gif"
          >
          <div class="timeline-form-actions">
            <label class="timeline-image-input-label timeline-image-input-label-compose" for="timeline-image-input" aria-label="画像を添付">
              <img src="{{ url_for('static', filename='photo_icon.png') }}" alt="" aria-hidden="true">
            </label>
            <p id="timeline-char-count" class="timeline-char-count" aria-live="polite">0/100</p>
            <button type="submit" class="timeline-submit-btn" aria-label="投稿する">
              <img src="{{ url_for('static', filename='send_icon.png') }}" alt="" aria-hidden="true">
            </button>
          </div>
        </div>
      </form>
    </section>

    <div class="timeline-editor-nav" data-aos="fade-up">
      <a class="timeline-editor-link" href="{{ url_for('mytimeline', q=search_query or None) }}">閲覧ページをみる</a>
    </div>

    <main class="timeline-list" id="timeline-list">
      {% if posts %}
        {% for post in posts %}
          {% include "_mytimeline_edit_item.html" %}
        {% endfor %}
      {% else %}
        <p id="timeline-empty-message" class="timeline-empty" data-aos="fade-up">そんなことあったっけ？<br>書き忘れたか、あるいは夢じゃないかな。</p>
      {% endif %}
    </main>
  </div>

  <div class="timeline-search-dock">
    <form
      id="timeline-search-shell"
      class="timeline-search-shell {% if search_query %}is-open{% endif %}"
      method="get"
      action="{{ url_for('mytimeline_edit', token=token) }}"
    >
      <input
        id="timeline-search-input"
        class="timeline-search-input"
        type="search"
        name="q"
        value="{{ search_query }}"
        placeholder="思いだす..."
        autocomplete="off"
      >
      <button
        id="search-toggle-btn"
        class="timeline-search-toggle {% if search_query %}is-open{% endif %}"
        type="button"
        aria-label="検索を表示"
        aria-expanded="{{ 'true' if search_query else 'false' }}"
      >
        <img src="{{ url_for('static', filename='search_icon.png') }}" alt="" aria-hidden="true">
      </button>
    </form>
  </div>

  <script src="{{ url_for('static', filename='aos.js') }}"></script>
  <script>
    AOS.init({
      duration: 500,
      easing: 'ease-in-out',
      once: false
    });
    window.addEventListener('load', () => {
      AOS.refreshHard();
    });

    const composeForm = document.getElementById('timeline-compose-form');
    const contentEl = document.getElementById('content');
    const charCountEl = document.getElementById('timeline-char-count');
    const timelineList = document.getElementById('timeline-list');
    const composeSubmitBtn = composeForm ? composeForm.querySelector('.timeline-submit-btn') : null;
    let isSubmitting = false;

    const updateCharCount = () => {
      if (!contentEl || !charCountEl) return;
      charCountEl.textContent = `${contentEl.value.length}/100`;
    };
    updateCharCount();

    if (contentEl) {
      contentEl.addEventListener('input', updateCharCount);
      contentEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && (event.metaKey || event.ctrlKey)) {
          event.preventDefault();
          if (composeForm) composeForm.requestSubmit();
        }
      });
    }

    const closeAllMenus = () => {
      document.querySelectorAll('.timeline-menu-wrap.is-open').forEach((openWrap) => {
        openWrap.classList.remove('is-open');
        const btn = openWrap.querySelector('.timeline-menu-toggle');
        if (btn) btn.setAttribute('aria-expanded', 'false');
      });
    };

    const closeEditForms = () => {
      document.querySelectorAll('[data-edit-form].is-open').forEach((form) => {
        form.classList.remove('is-open');
      });
    };

    const bindItemInteractions = (root = document) => {
      root.querySelectorAll('[data-edit-form]').forEach((form) => {
        if (form.dataset.bound === '1') return;
        form.dataset.bound = '1';
        form.addEventListener('click', (event) => {
          event.stopPropagation();
        });
      });

      root.querySelectorAll('.timeline-menu-toggle').forEach((toggle) => {
        if (toggle.dataset.bound === '1') return;
        toggle.dataset.bound = '1';
        toggle.addEventListener('click', (event) => {
          event.stopPropagation();
          const wrap = toggle.closest('.timeline-menu-wrap');
          if (!wrap) return;
          const isOpen = wrap.classList.contains('is-open');
          closeAllMenus();
          if (!isOpen) {
            wrap.classList.add('is-open');
            toggle.setAttribute('aria-expanded', 'true');
          }
        });
      });

      root.querySelectorAll('[data-edit-toggle]').forEach((button) => {
        if (button.dataset.bound === '1') return;
        button.dataset.bound = '1';
        button.addEventListener('click', (event) => {
          event.stopPropagation();
          const postId = button.getAttribute('data-edit-toggle');
          if (!postId) return;
          const targetForm = document.querySelector(`[data-edit-form="${postId}"]`);
          if (!targetForm) return;
          const willOpen = !targetForm.classList.contains('is-open');
          closeEditForms();
          if (willOpen) {
            targetForm.classList.add('is-open');
            const textarea = targetForm.querySelector('textarea');
            if (textarea) textarea.focus();
          }
          closeAllMenus();
        });
      });
    };

    bindItemInteractions();

    document.addEventListener('click', () => {
      closeAllMenus();
      closeEditForms();
    });

    if (composeForm && timelineList && composeSubmitBtn) {
      composeForm.addEventListener('submit', async (event) => {
        event.preventDefault();
        if (isSubmitting) return;

        const currentContent = contentEl ? contentEl.value.trim() : '';
        if (!currentContent) return;

        isSubmitting = true;
        composeSubmitBtn.disabled = true;
        composeSubmitBtn.setAttribute('aria-disabled', 'true');

        try {
          const response = await fetch(composeForm.action, {
            method: 'POST',
            body: new FormData(composeForm),
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
          });
          const payload = await response.json();
          if (!response.ok || !payload.ok) {
            throw new Error(payload.error || '投稿に失敗しました。');
          }

          if (payload.post_html) {
            const temp = document.createElement('div');
            temp.innerHTML = payload.post_html.trim();
            const newItem = temp.firstElementChild;
            if (newItem) {
              const emptyMessage = document.getElementById('timeline-empty-message');
              if (emptyMessage) emptyMessage.remove();
              timelineList.prepend(newItem);
              bindItemInteractions(newItem);
              AOS.refreshHard();
            }
          }

          composeForm.reset();
          updateCharCount();
          if (contentEl) contentEl.focus();
        } catch (err) {
          alert(err instanceof Error ? err.message : '投稿に失敗しました。');
        } finally {
          isSubmitting = false;
          composeSubmitBtn.disabled = false;
          composeSubmitBtn.removeAttribute('aria-disabled');
        }
      });
    }

    const searchToggleBtn = document.getElementById('search-toggle-btn');
    const searchShell = document.getElementById('timeline-search-shell');
    const searchInput = document.getElementById('timeline-search-input');
    if (searchToggleBtn && searchShell) {
      const clearSearchFilter = () => {
        const currentUrl = new URL(window.location.href);
        if (!currentUrl.searchParams.has('q')) return;
        currentUrl.searchParams.delete('q');
        window.location.assign(currentUrl.toString());
      };

      searchShell.addEventListener('submit', (event) => {
        if (!searchInput || searchInput.value.trim()) return;
        event.preventDefault();
        clearSearchFilter();
      });

      searchToggleBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        const isOpen = searchShell.classList.contains('is-open');
        if (isOpen && searchInput && searchInput.value.trim()) {
          searchShell.requestSubmit();
          return;
        }
        if (isOpen && searchInput && !searchInput.value.trim()) {
          searchShell.classList.remove('is-open');
          searchToggleBtn.classList.remove('is-open');
          searchToggleBtn.setAttribute('aria-expanded', 'false');
          clearSearchFilter();
          return;
        }
        const willOpen = !isOpen;
        searchShell.classList.toggle('is-open', willOpen);
        searchToggleBtn.classList.toggle('is-open', willOpen);
        searchToggleBtn.setAttribute('aria-expanded', willOpen ? 'true' : 'false');
        if (willOpen && searchInput) {
          setTimeout(() => searchInput.focus(), 120);
        }
      });

      document.addEventListener('click', (event) => {
        if (searchShell.contains(event.target) || searchToggleBtn.contains(event.target)) return;
        if (searchInput && searchInput.value.trim()) return;
        searchShell.classList.remove('is-open');
        searchToggleBtn.classList.remove('is-open');
        searchToggleBtn.setAttribute('aria-expanded', 'false');
        clearSearchFilter();
      });

      if (searchInput) {
        searchInput.addEventListener('blur', () => {
          if (searchInput.value.trim()) return;
          setTimeout(() => {
            if (searchShell.contains(document.activeElement)) return;
            searchShell.classList.remove('is-open');
            searchToggleBtn.classList.remove('is-open');
            searchToggleBtn.setAttribute('aria-expanded', 'false');
            clearSearchFilter();
          }, 0);
        });
      }
    }

    const cleanedUrl = new URL(window.location.href);
    if (cleanedUrl.searchParams.has('posted')) {
      cleanedUrl.searchParams.delete('posted');
      window.history.replaceState({}, '', cleanedUrl.toString());
    }
  </script>
</body>
</html>
